# Traefik overlay (proxy reverso + TLS Let's Encrypt) — OPCIONAL.
# Só é implantado pelo install.sh quando NÃO há um Traefik já rodando no host,
# para evitar conflito nas portas 80/443. Se você já tem um Traefik (com
# provider Swarm e na rede 'wootrico_wootrico'), NÃO use este arquivo: as labels
# do serviço 'app' (em docker-compose.yml) já expõem a rota do painel/webhook.
#
#   docker stack deploy -c docker-compose.yml -c docker-compose.traefik.yml wootrico
services:
  traefik:
    image: traefik:v3
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=wootrico
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks: [wootrico]
    deploy:
      replicas: 1
      restart_policy: { condition: any, delay: 5s }
      placement: { constraints: [node.role == manager] }

networks:
  wootrico:
    driver: overlay
    attachable: true

volumes:
  traefik_letsencrypt:
